name: EAS Update (OTA)

on:
  push:
    branches: [master]
    paths:
      - "blended-native/**"

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blended-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blended-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Publish EAS Update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas update --branch production --message "CI: OTA update from $GITHUB_SHA"

